name: VaultAI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Make mvnw executable
        run: chmod +x mvnw
      - name: Build and Test
        run: ./mvnw test -Dspring.datasource.url=jdbc:h2:mem:testdb

  embedding:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: embedding-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install fastapi uvicorn qdrant-client rank-bm25 psycopg2-binary python-dotenv redis requests
      - name: Syntax check
        run: python -m py_compile main.py chunker.py embedder.py searcher.py reranker.py