global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'vaultai-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8085']

  - job_name: 'vaultai-embedding'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8002']