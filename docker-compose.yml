version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: vaultai-redis
    ports:
      - "6381:6379"
    networks:
      - vaultai-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: vaultai-qdrant
    ports:
      - "6335:6333"
    volumes:
      - qdrantdata:/qdrant/storage
    networks:
      - vaultai-net

  prometheus:
    image: prom/prometheus:latest
    container_name: vaultai-prometheus
    ports:
      - "9092:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - vaultai-net

  grafana:
    image: grafana/grafana:latest
    container_name: vaultai-grafana
    ports:
      - "3006:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./infra/grafana:/etc/grafana/provisioning/datasources
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - vaultai-net

volumes:
  qdrantdata:
  grafanadata:

networks:
  vaultai-net:
    driver: bridge